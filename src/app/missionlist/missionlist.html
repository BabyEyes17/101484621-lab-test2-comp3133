<h1>SpaceX Mission Launch List</h1>

<div *ngFor="let mission of missions">
  <mat-card [routerLink]="['/mission', mission.flight_number]" class="mission-card">
    <mat-card-header>
      <img mat-card-avatar [src]="mission.links.mission_patch_small" alt="patch">
      <mat-card-title>{{ mission.mission_name }}</mat-card-title>
      <mat-card-subtitle>{{ mission.launch_year }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>{{ mission.details }}</p>
    </mat-card-content>
  </mat-card>
</div>
